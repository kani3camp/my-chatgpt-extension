<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Response Notifier</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">ChatGPT Response Notifier</p>
      <h1>Notification sound</h1>
      <label class="toggle" for="enabled">
        <span>Enabled</span>
        <input id="enabled" type="checkbox" />
      </label>
      <label class="slider" for="volume">
        <span>Volume</span>
        <div class="sliderRow">
          <input id="volume" type="range" min="0" max="100" step="1" />
          <output id="volumeValue" for="volume">80%</output>
        </div>
      </label>
      <button id="testButton" type="button">Test sound</button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
